<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Plataforma Logística - Centro de Mando</title>
  <style>
    /* Forzar a que el navegador elimine cualquier espacio en blanco */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden; /* Evita que la página externa tenga su propia barra de scroll */
      background-color: #f3f4f6; /* Color gris de fondo para emparejar con Tailwind */
    }

    /* Contenedor del marco */
    .iframe-container {
      width: 100%;
      height: 100%;
      border: none;
      margin: 0;
      padding: 0;
      position: absolute;
      top: 0;
      left: 0;
    }

    /* Configuración del marco de Google para que actúe de manera responsiva */
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

  <div class="iframe-container">
    <iframe src="https://script.google.com/macros/s/AKfycbxAI4MJl1apZOnv9WJIT7vyLl8ON9e1npoyJteD1Np_8JjH-ux8gIbu1vXXHOSHpf3jGQ/exec"></iframe>
  </div>

</body>
